interface:
  display_name: "Hebrew Ghostwriter"
  short_description: "Write Hebrew content indistinguishable from a native Israeli human. 8-layer system: Hebrew Mind, Linguistic Precision, Anti-Detection, Israeli Voice, Rhythm, Self-Audit, Soul, Versatility."
  default_prompt: "Apply $hebrew-ghostwriter to this task. Generate, rewrite, or detect AI patterns in Hebrew text. Default mode is generate. Apply all 8 layers: Hebrew-first thinking (no English-to-Hebrew translation), linguistic precision (gender system with strategic imperfection, construct/של by register, binyanim awareness), anti-detection (16-word blacklist, P1-P6 patterns, 10 Hebrew-specific tells, 5 Big No-Nos), Israeli Voice (dugri principle, slang by register, discourse markers נו/אז/בעצם, cultural texture), rhythm engineering (3-40 rule, burstiness pattern, 20-30% perplexity injection), self-audit loop (9-dimension scoring, 95/100 threshold, no dimension below 8), Soul Layer (20 techniques across specificity/conviction/digression/vulnerability/non-linearity/Hebrew markers), and Versatility Engine (Variation Fingerprint with 5 dimensions, cross-piece memory at .claude/hebrew-ghostwriter/variation-log.json). Honor Tier 1 violations: no em-dashes, no blacklist vocabulary, max 1 negative parallelism, no significance inflation, no macro copy windup, no 3+ consecutive same-length sentences, no formal connectors in casual register. Output the Hebrew text only — no metadata, no explanations, no 'here is your text.' Output score block only if --show-score is set."
policy:
  allow_implicit_invocation: true
